<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8"> <! -- добавление кодировки unf-8 для отображения кириллицы -->
    <meta name="viewport" content="width=device-width, initial-scale=1"> <! -- добавление для адаптивности страницы -->
    <title>Task Tracker</title> <! -- добавление названия страницы -->

  </head>
  <body>
    {% csrf_token %} <! -- добавление токена для защиты от csrf атак -->

        <br>

        <br>

         <ul class="list-group"> <! -- добавление списка задач -->

            </li>

            </li> 
            <li class="list-group-item mb-2">

            </li>

              4. Поехать на тренировку.
            </li>

            </li>

              7. Время для отдыха.
            </li> 

        </ul>



      </div>


      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script> <! --  запуск bootstrap -->
